harness: claude-code
environment:
  name: agent-runtime
  image:
    kind: preset
    name: node24
  resources:
    cpuCount: 2
    memoryMB: 8192
  setup:
    - name: install-dependencies
      commands:
        - npm install
      cache:
        files:
          - package-lock.json
  setupCache:
    ttl: 24h
