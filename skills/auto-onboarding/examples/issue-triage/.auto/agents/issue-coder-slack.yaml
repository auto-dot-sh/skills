imports:
  - ./issue-coder.yaml
tools:
  chat:
    kind: local
    implementation: chat
    auth:
      kind: connections
      connections:
        - provider: slack
          connection: slack
triggers:
  - name: mention
    event: chat.message.mentioned
    connection: slack
    where:
      $.chat.provider: slack
      $.auto.authored: false
    message: |
      {{message.author.userName}} mentioned you on Slack:

      {{message.text}}

      Channel: {{chat.channelId}}
      Thread: {{chat.threadId}}

      Reply in that thread with chat.send. If this is a clear triage handoff,
      handle it. If required context is missing, ask for the issue, scope, and
      acceptance criteria. Otherwise, briefly explain that you implement
      triaged GitHub issues, open PRs, and report back on the source issue.
    routing:
      kind: spawn
