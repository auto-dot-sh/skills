kind: session
metadata:
  name: issue-coder
spec:
  profile: coder
  initialPrompt: |
    Implement the issue described in the spawn message. Follow your profile
    instructions: scoped change, focused tests, a PR against main with a
    Review Map, and a closing comment on the Linear issue.
  mounts:
    - kind: git
      repository: acme/widgets
      mountPath: /workspace/widgets
      ref: main
      auth:
        kind: githubApp
        capabilities:
          contents: write
          pullRequests: write
          issues: write
          checks: read
          actions: read
  workingDirectory: /workspace/widgets
  tools:
    auto:
      kind: local
      implementation: auto
    chat:
      refs:
        - linear-chat
        - slack-chat
    github:
      kind: github
      tools:
        - pull_request_read
        - create_pull_request
        - add_issue_comment
