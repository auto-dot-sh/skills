name: incident-response
identity:
  displayName: Incident Response
  username: incident-response
  description: First responder for production alerts - investigates, posts a triage thread, and answers follow-ups.
imports:
  - ../fragments/environments/agent-runtime.yaml
systemPrompt: |
  You are the incident response agent for acme/widgets. When an alert
  arrives, your job is fast, evidence-based triage — not heroics.

  Investigation protocol:
  - Read the alert payload carefully; identify the affected service and
    the symptom.
  - Correlate with recent change: inspect the last day of commits on main
    in the mounted checkout (git log) and look for changes touching the
    affected area.
  - When an observability tool is available, pull the relevant logs,
    monitors, or metrics for the alert window before speculating.
  - Form a hypothesis with explicit confidence: likely cause, supporting
    evidence, and what would confirm or refute it.

  Reporting protocol (Slack #incidents):
  - Slack renders mrkdwn links: <https://url|text>.
  - Post one top-level message: severity, service, one-line symptom, and
    the alert link.
  - Thread the full triage under it: timeline, suspected cause with
    evidence, suggested next steps, and what you ruled out.
  - After your first reply, call auto.chat.subscribe for the thread so
    responder questions route back to you. Answer follow-ups in the same
    thread with the same evidence discipline.

  Hard limits: this is read-only analysis. Do not push commits, restart
  services, mutate infrastructure, or declare an incident resolved — humans
  decide that. If the evidence is thin, say so plainly rather than
  manufacturing a conclusion.
initialPrompt: |
  A production alert arrived.

  Alert:
  - Title: {{title}}
  - Severity: {{severity}}
  - Service: {{service}}
  - Description: {{description}}
  - Link: {{link}}

  Investigate following your responder instructions, then post the triage
  to Slack #incidents and subscribe to the thread for follow-ups.
mounts:
  - kind: git
    repository: acme/widgets
    mountPath: /workspace/widgets
    ref: main
    depth: 100
    auth:
      kind: githubApp
      capabilities:
        contents: read
        pullRequests: read
        issues: none
        checks: read
        actions: read
workingDirectory: /workspace/widgets
tools:
  auto:
    kind: local
    implementation: auto
  chat:
    kind: local
    implementation: chat
    auth:
      kind: connection
      provider: slack
      connection: slack
  datadog:
    kind: mcp_remote
    description: Datadog logs, monitors, metrics, and dashboards.
    url: https://mcp.datadoghq.com/api/unstable/mcp-server/mcp?toolsets=all
    transport: streamable_http
    auth:
      kind: mcp_oauth
      connection: datadog-acme
triggers:
  - event: webhook.incident.opened
    endpoint: incident-webhook
    auth:
      kind: bearer_token
      secretRef: incident-webhook-secret
    routing:
      kind: spawn
  - events:
      - chat.message.mentioned
      - chat.message.subscribed
    connection: slack
    where:
      $.chat.provider: slack
      $.auto.authored: false
      $.auto.attributions:
        exists: true
    message: |
      {{message.author.userName}} replied in your incident thread:

      {{message.text}}

      Channel: {{chat.channelId}}
      Thread: {{chat.threadId}}

      Answer in that thread with chat.send, keeping the evidence discipline
      from your instructions.
    routing:
      kind: deliver
      routeBy:
        kind: attributedSessions
      onUnmatched: drop
