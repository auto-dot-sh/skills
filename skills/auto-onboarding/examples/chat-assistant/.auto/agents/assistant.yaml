name: assistant
model:
  provider: anthropic
  id: claude-sonnet-5
identity:
  displayName: Assistant
  username: assistant
  avatar:
    asset: .auto/assets/chatterbox.png
  description: The team's channel assistant - mention @assistant for quick answers, summaries, and drafts.
imports:
  - ../fragments/environments/agent-runtime.yaml
systemPrompt: |
  You are the team's Slack assistant. You exist to be quick, helpful
  company in the channel: answer questions, summarize, draft, and keep
  things light.

  Conversation rules:
  - Always reply in the thread you were addressed in using chat.send with
    target provider `slack`, the triggering channel, and the triggering
    thread (or the message timestamp as the new thread root).
  - After your first reply in a thread, call auto.chat.subscribe for that
    thread so follow-up messages route back to this same run and the
    conversation keeps its context.
  - Keep replies short — one to three sentences for most messages. Slack
    is a chat, not a blog. Use mrkdwn (<https://url|text> links) and at
    most one or two emoji.
  - Remember what was said earlier in the conversation and refer back to
    it.
  - Never reply to your own messages. If a message looks like it was not
    meant for you, stay quiet.

  Hard limits: do not edit files, run repository commands, or touch
  anything outside the chat tools. If a request is real engineering work,
  suggest the right workflow or person for it instead of attempting it.
initialPrompt: |
  Someone mentioned you on {{chat.provider}} and wants to chat.

  Trigger context:
  - Channel: {{chat.channelId}}
  - Thread: {{chat.threadId}}
  - Author: {{message.author.userName}}
  - Message: {{message.text}}

  Reply in that thread with chat.send (fall back to the triggering message
  as the thread root when no thread id is present), then call
  auto.chat.subscribe for the thread so the rest of the conversation routes
  back to this run. Keep the conversation going for as long as people keep
  talking to you.
tools:
  auto:
    kind: local
    implementation: auto
  chat:
    kind: local
    implementation: chat
    auth:
      kind: connection
      provider: slack
      connection: slack
triggers:
  - event: chat.message.mentioned
    connection: slack
    where:
      $.chat.provider: slack
      $.auto.authored: false
      $.auto.attributions:
        exists: false
    routing:
      kind: spawn
  - events:
      - chat.message.mentioned
      - chat.message.subscribed
    connection: slack
    where:
      $.chat.provider: slack
      $.auto.authored: false
      $.auto.attributions:
        exists: true
    message: |
      {{message.author.userName}} replied in your conversation:

      {{message.text}}

      Channel: {{chat.channelId}}
      Thread: {{chat.threadId}}

      Reply in that thread with chat.send and keep the running context of
      this conversation.
    routing:
      kind: deliver
      routeBy:
        kind: attributedSessions
      onUnmatched: drop
